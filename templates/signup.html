<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - Certificate Generator</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        .container{background:white;border-radius:20px;padding:40px;max-width:450px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        h1{text-align:center;color:#333;margin-bottom:10px}
        p{text-align:center;color:#666;margin-bottom:25px}
        .form-group{margin-bottom:18px}
        label{display:block;margin-bottom:5px;color:#555;font-weight:600;font-size:14px}
        input,select{width:100%;padding:12px 15px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px}
        input:focus,select:focus{outline:none;border-color:#667eea}
        .btn{width:100%;padding:14px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;border-radius:10px;font-size:18px;font-weight:600;cursor:pointer}
        .btn:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(102,126,234,0.4)}
        .link{text-align:center;margin-top:15px}
        .link a{color:#667eea;text-decoration:none}
        .link a:hover{text-decoration:underline}
        .error{background:#f8d7da;color:#721c24;padding:12px;border-radius:8px;margin-bottom:15px;display:none}
        .success{background:#d4edda;color:#155724;padding:12px;border-radius:8px;margin-bottom:15px;display:none}
        .password-hint{font-size:12px;color:#999;margin-top:5px}
    </style>
</head>
<body>
<div class="container">
    <h1>📝 Sign Up</h1>
    <p>Create your account to start generating certificates</p>
    
    <div id="errorMsg" class="error"></div>
    <div id="successMsg" class="success"></div>
    
    <form id="signupForm">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter your full name" required>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Create a password (min 4 characters)" required minlength="4">
            <div class="password-hint">Password must be at least 4 characters</div>
        </div>
        <div class="form-group">
            <label>Role</label>
            <select id="role">
                <option value="user">User - Generate certificates</option>
                <option value="admin">Admin - Full access</option>
            </select>
        </div>
        <button type="submit" class="btn">Create Account</button>
    </form>
    
    <div class="link">
        Already have an account? <a href="/login">Login</a>
    </div>
    <div class="link" style="margin-top:5px">
        <a href="/">← Back to Home</a>
    </div>
</div>

<script>
document.getElementById('signupForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const errorDiv = document.getElementById('errorMsg');
    const successDiv = document.getElementById('successMsg');
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';
    
    const password = document.getElementById('password').value;
    if (password.length < 4) {
        errorDiv.textContent = '❌ Password must be at least 4 characters long';
        errorDiv.style.display = 'block';
        return;
    }
    
    const formData = new FormData();
    formData.append('name', document.getElementById('name').value);
    formData.append('email', document.getElementById('email').value);
    formData.append('password', password);
    formData.append('role', document.getElementById('role').value);
    
    try {
        const response = await fetch('/api/register', {
            method: 'POST',
            body: formData
        });
        
        const data = await response.json();
        
        if (data.success) {
            successDiv.textContent = '✅ Account created successfully! Redirecting to login...';
            successDiv.style.display = 'block';
            setTimeout(() => {
                window.location.href = '/login';
            }, 1500);
        } else {
            errorDiv.textContent = '❌ ' + (data.message || 'Registration failed');
            errorDiv.style.display = 'block';
        }
    } catch (error) {
        errorDiv.textContent = '❌ Error: ' + error.message;
        errorDiv.style.display = 'block';
    }
});
</script>
</body>
</html>
