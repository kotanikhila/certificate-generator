<!DOCTYPE html>
<html>
<head>
    <title>Login - Certificate Generator</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        .container{background:white;border-radius:20px;padding:40px;max-width:450px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        h1{text-align:center;color:#333;margin-bottom:10px}
        p{text-align:center;color:#666;margin-bottom:25px}
        .form-group{margin-bottom:18px}
        label{display:block;margin-bottom:5px;color:#555;font-weight:600;font-size:14px}
        input{width:100%;padding:12px 15px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px}
        input:focus{outline:none;border-color:#667eea}
        .btn{width:100%;padding:14px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;border-radius:10px;font-size:18px;font-weight:600;cursor:pointer}
        .btn:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(102,126,234,0.4)}
        .link{text-align:center;margin-top:15px}
        .link a{color:#667eea;text-decoration:none}
        .link a:hover{text-decoration:underline}
        .error{background:#f8d7da;color:#721c24;padding:12px;border-radius:8px;margin-bottom:15px;display:none}
        .success{background:#d4edda;color:#155724;padding:12px;border-radius:8px;margin-bottom:15px;display:none}
        .demo-credentials{background:#f8f9fa;padding:12px;border-radius:8px;margin-bottom:15px;font-size:13px;color:#666}
        .demo-credentials strong{color:#333}
    </style>
</head>
<body>
<div class="container">
    <h1>🔐 Login</h1>
    <p>Welcome back! Login to access your dashboard</p>
    
    <div class="demo-credentials">
        <strong>Demo Credentials:</strong><br>
        Email: <strong>demo@example.com</strong><br>
        Password: <strong>demo123</strong>
    </div>
    
    <div id="errorMsg" class="error"></div>
    <div id="successMsg" class="success"></div>
    
    <form id="loginForm">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn">Login</button>
    </form>
    
    <div class="link">
        Don't have an account? <a href="/signup">Sign Up</a>
    </div>
    <div class="link" style="margin-top:5px">
        <a href="/">← Back to Home</a>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const errorDiv = document.getElementById('errorMsg');
    const successDiv = document.getElementById('successMsg');
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';
    
    const formData = new FormData();
    formData.append('email', document.getElementById('email').value);
    formData.append('password', document.getElementById('password').value);
    
    try {
        const response = await fetch('/api/login', {
            method: 'POST',
            body: formData
        });
        
        const data = await response.json();
        
        if (data.success) {
            localStorage.setItem('token', data.access_token);
            localStorage.setItem('user', JSON.stringify(data.user));
            successDiv.textContent = '✅ Login successful! Redirecting...';
            successDiv.style.display = 'block';
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 1000);
        } else {
            errorDiv.textContent = '❌ ' + (data.message || 'Login failed. Please check your credentials.');
            errorDiv.style.display = 'block';
        }
    } catch (error) {
        errorDiv.textContent = '❌ Error: ' + error.message;
        errorDiv.style.display = 'block';
    }
});
</script>
</body>
</html>
